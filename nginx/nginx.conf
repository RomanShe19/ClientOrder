worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ─────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Rate Limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=admin:10m   rate=3r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # ── Security Headers ────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Upstreams ───────────────────────────────────────────
    # upstream registry_upstream { server registry:5000; }   # отключено
    # upstream pgadmin_upstream { server pgadmin:80; }        # отключено

    upstream backend_upstream {
        server backend:8000;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    # ================================================================
    # HTTP → HTTPS redirect (включить после настройки SSL)
    # ================================================================
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ================================================================
    # Main Server (HTTP — временно, пока нет SSL)
    # ================================================================
    server {
        listen 80;
        server_name _;

        # ── Frontend ───────────────────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;

            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Auth API (rate-limited: 5 req/min) ────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://backend_upstream/v1/auth/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── Backend API ─────────────────────────────────────
        location /api/ {
            limit_req zone=general burst=30 nodelay;

            proxy_pass http://backend_upstream/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── Backend Docs (Swagger / ReDoc) ─────────────────
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Docker Registry (/v2/) — ОТКЛЮЧЕНО ────────────
        # location /v2/ {
        #     client_max_body_size 0; chunked_transfer_encoding on;
        #     proxy_pass http://registry_upstream;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $http_host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_read_timeout 900s; proxy_send_timeout 900s;
        #     proxy_buffering off;
        # }

        # ── pgAdmin — ОТКЛЮЧЕНО ─────────────────────────────
        # location /pgadmin/static/ {
        #     proxy_pass http://pgadmin_upstream;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_buffering on; proxy_cache_valid 200 1h;
        # }
        # location /pgadmin/ {
        #     limit_req zone=admin burst=30 nodelay;
        #     auth_basic "Restricted Area";
        #     auth_basic_user_file /etc/nginx/auth/.htpasswd_admin;
        #     proxy_pass http://pgadmin_upstream;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_set_header X-Script-Name /pgadmin;
        #     proxy_connect_timeout 10s;
        #     proxy_read_timeout 300s; proxy_send_timeout 300s;
        # }

        location ~ /\. {
            deny all;
            return 404;
        }
    }

    # ================================================================
    # HTTPS Server (раскомментировать после настройки SSL)
    # ================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_session_tickets off;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #
    #     # ... скопировать location-блоки из HTTP-сервера выше ...
    # }
}
