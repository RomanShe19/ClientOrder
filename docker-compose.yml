services:

  # ============================================================
  # NGINX — единственная точка входа (порты 80/443)
  # ============================================================
  nginx:
    image: nginx:1-alpine
    container_name: autovip-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/auth:/etc/nginx/auth:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - frontend-network
    depends_on:
      # - registry    # отключено, раскомментировать при необходимости
      # - pgadmin     # отключено, раскомментировать при необходимости
      - backend
      - frontend
    restart: unless-stopped
    mem_limit: 48m
    memswap_limit: 48m
    cpus: 0.3
    pids_limit: 128
    oom_score_adj: 100
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ============================================================
  # Frontend — React SPA (static files via internal Nginx)
  # ============================================================
  frontend:
    image: localhost:5000/autovip-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: autovip-frontend
    networks:
      - frontend-network
    restart: unless-stopped
    mem_limit: 32m
    memswap_limit: 48m
    cpus: 0.15
    pids_limit: 64
    oom_score_adj: 200
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ============================================================
  # PostgreSQL — только backend-network, порты НЕ пробрасываются
  # Тюнинг под 1 GB RAM: shared_buffers=64MB, max_connections=20
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: autovip-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=64MB"
      - "-c"
      - "effective_cache_size=128MB"
      - "-c"
      - "work_mem=2MB"
      - "-c"
      - "maintenance_work_mem=32MB"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "wal_buffers=2MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 384m
    cpus: 0.5
    pids_limit: 128
    oom_score_adj: -500
    labels:
      com.centurylinklabs.watchtower.enable: "false"

  # ============================================================
  # pgAdmin — ОТКЛЮЧЕНО. Раскомментировать при необходимости.
  # Доступ только через Nginx + Basic Auth
  # ============================================================
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: autovip-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
  #     PGADMIN_CONFIG_PROXY_X_FOR_COUNT: "1"
  #     PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: "1"
  #     PGADMIN_CONFIG_PROXY_X_HOST_COUNT: "1"
  #     PGADMIN_CONFIG_WTF_CSRF_SSL_STRICT: "False"
  #     PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
  #     SCRIPT_NAME: /pgadmin
  #   volumes:
  #     - pgadmin-data:/var/lib/pgadmin
  #   networks:
  #     - frontend-network
  #     - backend-network
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped
  #   mem_limit: 256m
  #   memswap_limit: 384m
  #   cpus: 0.3
  #   pids_limit: 128
  #   oom_score_adj: 300
  #   labels:
  #     com.centurylinklabs.watchtower.enable: "false"

  # ============================================================
  # Backend — FastAPI (только через Nginx, порты не пробрасываются)
  # ============================================================
  backend:
    image: localhost:5000/autovip-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autovip-backend
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      SECRET_KEY: "${SECRET_KEY:-autovip-default-secret-change-me}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:-autovip-jwt-secret-change-me-32chars}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
      REFRESH_TOKEN_EXPIRE_DAYS: "${REFRESH_TOKEN_EXPIRE_DAYS:-7}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      APP_ENV: production
      DB_POOL_SIZE: 5
      DB_MAX_OVERFLOW: 3
    networks:
      - frontend-network
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 192m
    memswap_limit: 320m
    cpus: 0.5
    pids_limit: 256
    oom_score_adj: 0
    labels:
      com.centurylinklabs.watchtower.enable: "true"

  # ============================================================
  # Docker Registry — ОТКЛЮЧЕНО. Раскомментировать при необходимости.
  # Приватный реестр (localhost:5000 + Nginx /v2/)
  # ============================================================
  # registry:
  #   image: registry:2
  #   container_name: autovip-registry
  #   ports:
  #     - "127.0.0.1:5000:5000"
  #   environment:
  #     REGISTRY_AUTH: htpasswd
  #     REGISTRY_AUTH_HTPASSWD_REALM: "AutoVIP Private Registry"
  #     REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
  #     REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
  #     REGISTRY_STORAGE_DELETE_ENABLED: "true"
  #   volumes:
  #     - registry-data:/var/lib/registry
  #     - ./registry/auth:/auth:ro
  #   networks:
  #     - frontend-network
  #   restart: unless-stopped
  #   mem_limit: 64m
  #   memswap_limit: 128m
  #   cpus: 0.25
  #   pids_limit: 64
  #   oom_score_adj: 200
  #   labels:
  #     com.centurylinklabs.watchtower.enable: "false"

  # ============================================================
  # Watchtower — обновляет только контейнеры с label enable=true
  # ============================================================
  watchtower:
    image: containrrr/watchtower:latest
    container_name: autovip-watchtower
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      WATCHTOWER_NOTIFICATIONS: "shoutrrr"
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
      WATCHTOWER_ROLLING_RESTART: "true"
      DOCKER_API_VERSION: "1.43"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    mem_limit: 64m
    memswap_limit: 96m
    cpus: 0.15
    pids_limit: 32
    oom_score_adj: 500
    labels:
      com.centurylinklabs.watchtower.enable: "false"

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  registry-data:
  nginx-logs:
  pgadmin-data:
